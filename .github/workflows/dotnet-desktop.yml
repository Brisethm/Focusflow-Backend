name: SonarQube

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Deshabilita clones superficiales para un mejor análisis

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner

      - name: Build, Test and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}  # Aquí se inyecta de forma segura como variable de entorno
        shell: powershell
        run: |
          # 1. Iniciar el scanner usando la variable de entorno nativa de Windows ($env:)
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"Brisethm_Focusflow-Backend" /o:"focusflow" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.cs.vstest.reportsPaths="TestResults/*.trx" /d:sonar.cs.opencover.reportsPaths="TestResults/coverage.opencover.xml"
          
          # 2. Compilar el proyecto completo
          dotnet build
          
          # 3. Correr los tests generando resultados TRX y cobertura OpenCover dentro de TestResults
          New-Item -Path "TestResults" -ItemType Directory -Force
          $coveragePath = Join-Path $PWD "TestResults\coverage.opencover.xml"
          dotnet test "FocusFlow.Tests\FocusFlow.Tests.csproj" --no-build --logger "trx" --results-directory "TestResults" /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutput="$coveragePath"
          
          # 4. Finalizar el análisis enviando los datos acumulados
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
